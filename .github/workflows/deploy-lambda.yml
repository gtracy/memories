name: Deploy to Lambda

on:
  push:
    tags:
      - '*'
  workflow_dispatch:
    inputs:
      alias:
        description: 'Lambda alias to create/update (e.g., prod, dev)'
        required: true
        default: 'manual'

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm ci

      - name: Run Tests
        run: npm test

      - name: Create creds.json
        run: echo '${{ secrets.GOOGLE_CREDS_JSON }}' > creds.json

      - name: Build Deployment Package
        run: |
          chmod +x build.sh
          ./build.sh

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Upload to S3
        run: aws s3 cp function.zip s3://lambda-func-deploys/memories/function.zip

      - name: Update Lambda Code
        run: |
          aws lambda update-function-code \
            --function-name memories \
            --s3-bucket lambda-func-deploys \
            --s3-key memories/function.zip

      - name: Publish Version and Alias
        run: |
          # Wait for update verification (Lambda allows eventually consistent updates, but update-function-code is usually synchronous enough for publish)
          sleep 10
          
          echo "Publishing new version..."
          VERSION=$(aws lambda publish-version --function-name memories --query 'Version' --output text)
          echo "Published Version: $VERSION"
          
          # Use input alias if manual trigger, otherwise use tag name
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            ALIAS_NAME="${{ github.event.inputs.alias }}"
          else
            ALIAS_NAME="${{ github.ref_name }}"
          fi
          
          echo "Aliasing version $VERSION with alias $ALIAS_NAME"
          
          # Create alias, or update if it exists (though tags are usually immutable in git, re-running might happen)
          aws lambda create-alias --function-name memories --name "$ALIAS_NAME" --function-version "$VERSION" || \
          aws lambda update-alias --function-name memories --name "$ALIAS_NAME" --function-version "$VERSION"
